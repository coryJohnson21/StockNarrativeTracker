version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: narrativetracker
      POSTGRES_PASSWORD: narrativetracker
      POSTGRES_DB: narrativetracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U narrativetracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://narrativetracker:narrativetracker@db:5432/narrativetracker
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SEC_CONTACT_EMAIL: ${SEC_CONTACT_EMAIL}
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /tmp/narrativetracker:/tmp/narrativetracker

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
    external: true
    name: narrativetracker_postgres_data
